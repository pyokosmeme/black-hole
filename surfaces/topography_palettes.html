<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Topography & Splotches</title>
    <!-- Simplex Noise for generating organic topographic waves -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            pointer-events: none; /* Let clicks pass through empty areas */
            z-index: 10;
        }

        .info-panel {
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            border-radius: 16px;
            text-align: center;
            color: #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            pointer-events: auto;
            min-width: 300px;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        p {
            margin: 0;
            font-size: 0.95rem;
            opacity: 0.8;
            font-weight: 300;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-container">
        <div class="info-panel">
            <h1 id="palette-name">High-Contrast Cools</h1>
            <p id="palette-desc">Deep Teal & Cyan to make warm eyes pop</p>
        </div>
        <button id="cycle-btn">Cycle Palette</button>
    </div>

    <script>
        // --- 1. DEFINE COLOR PALETTES ---
        // Colors are stored in [R, G, B, A] arrays for smooth math interpolation
        const palettes = [
            {
                name: "High-Contrast Cools",
                desc: "Deep Teal & Cyan to make warm eyes pop",
                base: [10, 25, 47, 1], // Very dark slate blue
                lines: [100, 255, 218, 0.25], // Glowing cyan
                splotches: [
                    [17, 34, 64, 1], // Teal shadow
                    [2, 132, 199, 0.8], // Mid blue
                    [255, 183, 77, 0.35] // Amber accent (matches eyes)
                ]
            },
            {
                name: "Analogous Darks",
                desc: "Harmonizing with plum lips and iridescent tattoos",
                base: [28, 11, 25, 1], // Deep plum/burgundy
                lines: [199, 125, 255, 0.3], // Violet/Rose
                splotches: [
                    [74, 21, 75, 1], // Dark magenta
                    [123, 44, 191, 0.8], // Electric purple
                    [60, 9, 108, 0.9] // Deep violet
                ]
            },
            {
                name: "Monochromatic Warms",
                desc: "Warm coppers and golds to enhance skin tones",
                base: [41, 28, 20, 1], // Dark roasted brown
                lines: [244, 162, 97, 0.25], // Copper/Gold
                splotches: [
                    [231, 111, 81, 0.7], // Burnt terracotta
                    [233, 196, 106, 0.6], // Soft mustard
                    [138, 90, 68, 0.9] // Warm leather
                ]
            },
            {
                name: "Cyberpunk Synergy",
                desc: "Neon tropical contrast for high-tech environments",
                base: [5, 5, 8, 1], // Near black
                lines: [0, 243, 255, 0.35], // Neon cyan
                splotches: [
                    [255, 0, 60, 0.6], // Neon magenta/red
                    [122, 4, 235, 0.7], // Deep neon purple
                    [255, 170, 0, 0.4] // Amber/Orange glow
                ]
            }
        ];

        // --- 2. SETUP CANVAS & NOISE ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const simplex = new SimplexNoise();
        
        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 3. COLOR INTERPOLATION LOGIC ---
        // We use an exponential smoothing function so the colors glide smoothly
        // when you click the button, preventing sudden jarring snaps.
        let targetPaletteIndex = 0;
        let targetPalette = palettes[targetPaletteIndex];
        
        // Deep copy the starting palette to track our current rendering state
        let currentState = JSON.parse(JSON.stringify(palettes[0]));

        function smoothColor(current, target, speed = 0.04) {
            return [
                current[0] + (target[0] - current[0]) * speed,
                current[1] + (target[1] - current[1]) * speed,
                current[2] + (target[2] - current[2]) * speed,
                current[3] + (target[3] - current[3]) * speed,
            ];
        }

        function formatColor(c) {
            return `rgba(${Math.round(c[0])}, ${Math.round(c[1])}, ${Math.round(c[2])}, ${c[3]})`;
        }

        // --- 4. SPLOTCHES (ORBS) ---
        class Splotch {
            constructor(colorIndex) {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 400 + 200; // Large, soft radius
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.colorIndex = colorIndex; // Refers to splotches[0], [1], or [2]
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Soft bounce off invisible walls slightly outside the screen
                if (this.x < -100) this.vx = Math.abs(this.vx);
                if (this.x > width + 100) this.vx = -Math.abs(this.vx);
                if (this.y < -100) this.vy = Math.abs(this.vy);
                if (this.y > height + 100) this.vy = -Math.abs(this.vy);
            }

            draw(ctx) {
                let colorArr = currentState.splotches[this.colorIndex];
                let centerColor = formatColor(colorArr);
                
                // Fade edge to transparent
                let edgeColorArr = [...colorArr];
                edgeColorArr[3] = 0; 
                let edgeColor = formatColor(edgeColorArr);

                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, centerColor);
                gradient.addColorStop(1, edgeColor);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Create 6 splotches, 2 of each palette color accent
        const splotches = [];
        for(let i = 0; i < 6; i++) {
            splotches.push(new Splotch(i % 3));
        }

        // --- 5. ANIMATION LOOP ---
        let time = 0;
        function animate() {
            // Smoothly update colors towards the target palette
            currentState.base = smoothColor(currentState.base, targetPalette.base);
            currentState.lines = smoothColor(currentState.lines, targetPalette.lines);
            for(let i = 0; i < 3; i++){
                currentState.splotches[i] = smoothColor(currentState.splotches[i], targetPalette.splotches[i]);
            }

            // Draw Base Background
            ctx.fillStyle = formatColor(currentState.base);
            ctx.fillRect(0, 0, width, height);

            // Update & Draw Splotches (Additive/Screen style overlapping)
            // standard source-over looks best and most consistent, relying on RGBA alphas
            ctx.globalCompositeOperation = 'source-over';
            splotches.forEach(s => {
                s.update();
                s.draw(ctx);
            });

            // Draw Topographic Wave Lines
            ctx.strokeStyle = formatColor(currentState.lines);
            ctx.lineWidth = 1.5;
            
            const lineSpacing = 35;
            const xStep = 15;
            
            // Draw lines across the screen, offset by time and 3D noise
            for (let y = -200; y < height + 200; y += lineSpacing) {
                ctx.beginPath();
                for (let x = -100; x <= width + 100; x += xStep) {
                    // Combine a gentle sine wave with Simplex noise for organic contouring
                    let baseWave = Math.sin(x * 0.003 + time * 0.001) * 30;
                    let noise = simplex.noise3D(x * 0.0012, y * 0.0015, time * 0.0003);
                    let yOffset = baseWave + (noise * 180); 
                    
                    if (x === -100) {
                        ctx.moveTo(x, y + yOffset);
                    } else {
                        ctx.lineTo(x, y + yOffset);
                    }
                }
                ctx.stroke();
            }

            time += 1;
            requestAnimationFrame(animate);
        }

        // --- 6. UI INTERACTION ---
        document.getElementById('cycle-btn').addEventListener('click', () => {
            targetPaletteIndex = (targetPaletteIndex + 1) % palettes.length;
            targetPalette = palettes[targetPaletteIndex];
            
            // Immediately update the text UI, canvas colors will smoothly transition
            document.getElementById('palette-name').innerText = targetPalette.name;
            document.getElementById('palette-desc').innerText = targetPalette.desc;
        });

        // Start the loop
        animate();
    </script>
</body>
</html>
