<!DOCTYPE html>
<html lang="en">
<head>
  <title>SURFACES // lastnpcalex.agency</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="surfaces — small vibe-coded toys, tools and sketches by A.N. Alex, splayed in the night sky.">
  <meta name="author" content="Author NPC Alex">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="lastnpcalex.agency">
  <meta property="og:title" content="SURFACES // lastnpcalex.agency">
  <meta property="og:description" content="whiskey-translucent fractals splayed in the night sky ;; small vibe-coded surfaces.">
  <meta property="og:url" content="https://lastnpcalex.agency/surfaces.html">
  <meta property="og:image" content="https://lastnpcalex.agency/img/banner.png">

  <meta name="theme-color" content="#0a0618">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/surfaces.css?v=101">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- three r128 + simplex for the Circos ring's topography background (local js-libs is r73, too old) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
</head>
<body>
  <!-- 3D topography background — full viewport, fixed behind everything -->
  <div id="srf-topo-bg" aria-hidden="true"></div>
  <div class="srf-stars" aria-hidden="true"></div>

  <!-- top frame: style changer + count + glosses trigger (JS fills #srf-controls) -->
  <div class="srf-frame srf-frame-top" id="srf-controls"></div>

  <!-- latent glosses fold-down panel (over the ring when open) -->
  <section class="srf-glosses-panel srf-comments" id="surfaces-comments-host" aria-label="Latent Glosses" hidden></section>

  <!-- the circle overlay — fills the viewport over the background -->
  <main class="srf-overlay" id="srf-stage"></main>

  <!-- bottom center: page counter + arrows (only when > 10 surfaces) -->
  <div class="srf-frame srf-frame-pager" id="srf-pager"></div>

  <aside class="srf-drawer" id="srf-drawer" aria-hidden="true"></aside>

  <script src="js/surfaces.js?v=101"></script>
  <script type="module">
    import { mount as mountComments } from './js/transmission-comments.js';
    const host = document.getElementById('surfaces-comments-host');
    if (host) {
      mountComments(host, {
        slug: 'surfaces-page',
        authorDid: 'did:plc:ccxl3ictrlvtrrgh5swvvg47'
      }).catch((error) => {
        host.textContent = 'latent glosses unavailable';
        console.error('[SURFACES] Comments mount failed:', error);
      });
    }
    // NOTE: the glosses toggle is handled by buildControls() in surfaces.js,
    // not here — it creates #srf-glosses-btn inside #srf-controls.
  </script>
</body>
</html>
