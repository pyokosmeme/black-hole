            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

                document.documentElement.classList.add('skip-webgl');
                console.log('[ACIDBURN] Skipping WebGL dependencies (lite mode detected)');
            }
        })();
    </script>

    <!-- ═══════════════════════════════════════════════════════════════
         APPLICATION SCRIPTS
         ═══════════════════════════════════════════════════════════════ -->

    <!-- Navigation Menu (optional) -->
    <script src="nav-menu.js"></script>

    <script>
    // Populate #post-view-title on post open; clear on close. Mirrors futures.html.
    (function() {
        const check = setInterval(() => {
            if (!window.AcidburnAuthor) return;
            clearInterval(check);

            const origLoadPost = window.AcidburnAuthor.loadPost;
            const origShowIndex = window.showIndex;

            function setTitle(slug) {
                const el = document.getElementById('post-view-title');
                if (!el) return;
                if (!slug) { el.textContent = ''; return; }
                const post = window.AcidburnAuthor.getPosts().find(p => p.slug === slug);
                el.textContent = (post ? (post.title || slug) : slug).toUpperCase();
            }

            window.AcidburnAuthor.loadPost = async function(slug) {
                await origLoadPost(slug);
                setTitle(slug);
                if (window.AcidburnMode) window.AcidburnMode.setMode(window.AcidburnMode.getMode());
            };
            window.showIndex = function() {
                origShowIndex();
                setTitle(null);
                if (window.AcidburnMode) window.AcidburnMode.setMode(window.AcidburnMode.getMode());
            };

            // Handle direct-link load (refresh on #post/slug)
            const hash = window.location.hash;
            if (hash.startsWith('#post/')) {
                const slug = hash.replace('#post/', '');
                const wait = setInterval(() => {
                    if (window.AcidburnAuthor.getPosts().length) {
                        clearInterval(wait);
                        setTitle(slug);
                    }
                }, 50);
            }

            // Copy-link button: copies the shareable /p/<slug> URL
            const shareBtn = document.getElementById('post-share-btn');
            if (shareBtn) {
                shareBtn.addEventListener('click', async () => {
                    const h = window.location.hash;
                    if (!h.startsWith('#post/')) return;
                    const slug = h.replace('#post/', '');
                    const url = `${window.location.origin}/p/${slug}`;
                    const orig = shareBtn.textContent;
                    try {
                        await navigator.clipboard.writeText(url);
                        shareBtn.textContent = '✓ COPIED';
                    } catch {
                        // Fallback for older browsers / insecure contexts
                        const ta = document.createElement('textarea');
                        ta.value = url;
                        document.body.appendChild(ta);
                        ta.select();
                        try { document.execCommand('copy'); } catch {}
                        document.body.removeChild(ta);
                        shareBtn.textContent = '✓ COPIED';
                    }
                    shareBtn.classList.add('copied');
                    setTimeout(() => {
                        shareBtn.textContent = orig;
                        shareBtn.classList.remove('copied');
                    }, 1600);
                });
            }

            // Tag filter — wait until posts are loaded
            const tagCheck = setInterval(() => {
                const posts = window.AcidburnAuthor.getPosts();
                if (!posts.length) return;
                clearInterval(tagCheck);

                const filterEl = document.getElementById('tag-filter');
                if (!filterEl) return;

                const seen = new Set();
                const tags = [];
                posts.forEach(p => (p.tags || []).forEach(t => {
                    if (!seen.has(t)) { seen.add(t); tags.push(t); }
                }));
                if (!tags.length) return;

                function applyFilter(tag) {
                    filterEl.querySelectorAll('.tag-filter-btn').forEach(btn => {
                        btn.classList.toggle('active', btn.dataset.tag === (tag || ''));
                    });
                    document.querySelectorAll('#posts-list .post-card').forEach(card => {
                        const post = posts.find(p => p.slug === card.dataset.slug);
                        const match = !tag || (post && (post.tags || []).includes(tag));
                        card.style.display = match ? '' : 'none';
                    });
                }

                filterEl.innerHTML =
                    `<button class="tag-filter-btn active" data-tag="">ALL</button>` +
                    tags.map(t => `<button class="tag-filter-btn" data-tag="${t}">#${t}</button>`).join('');

                filterEl.addEventListener('click', e => {
                    const btn = e.target.closest('.tag-filter-btn');
                    if (!btn) return;
                    applyFilter(btn.dataset.tag || null);
                });
            }, 50);
        }, 50);
    })();
    </script>
