<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATproto Comment Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/acidburn.css">
  <link rel="stylesheet" href="css/bsky-test.css">
  <script type="module">
    import * as Auth from './js/bsky-auth.js';
    import * as Comment from './js/bsky-comment.js';

    const SITE_DID = 'did:plc:ccxl3ictrlvtrrgh5swvvg47';

    // ── DOM ──
    const $ = s => document.querySelector(s);
    function status(el, msg, type = '') {
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    // ── Auth ──
    let session = null;

    async function checkAuth() {
      const el = $('#auth-status');
      session = await Auth.getSession();

      if (session) {
        status(el, `@${session.handle} (${session.did.slice(0, 20)}...)`, 'success');
        $('#auth-form').style.display = 'none';
        $('#logout-btn').style.display = 'inline-block';
      } else {
        status(el, 'Enter your ATproto handle to sign in');
        $('#auth-form').style.display = 'flex';
        $('#logout-btn').style.display = 'none';
      }

      // Update comment buttons based on auth state
      updateCommentUI();
    }

    function updateCommentUI() {
      const logged = !!session;
      $('#post-comment-btn').disabled = !logged;
      if (!logged) {
        $('#post-comment-btn').title = 'Sign in to post comments';
      }
    }

    $('#login-btn').addEventListener('click', async () => {
      const handle = $('#handle-input').value.trim();
      const el = $('#auth-status');

      if (!handle) return status(el, 'Handle required', 'error');

      status(el, 'connecting...', 'loading');
      try {
        await Auth.login(handle); // Redirects to PDS
      } catch (e) {
        status(el, 'Login failed: ' + e.message, 'error');
      }
    });

    $('#logout-btn').addEventListener('click', async () => {
      await Auth.logout();
      session = null;
      checkAuth();
    });

    // ── Post Comment ──
    $('#post-comment-btn').addEventListener('click', async () => {
      const msg = $('#comment-input').value.trim();
      const post = $('#post-select').value;
      const el = $('#comment-status');

      if (!msg) return status(el, 'Message required', 'error');
      if (!session) return status(el, 'Sign in first', 'error');

      status(el, 'posting...', 'loading');
      try {
        const result = await Comment.post(msg, post, SITE_DID);
        status(el, 'posted! uri: ' + result.uri, 'success');
        $('#comment-input').value = '';
      } catch (e) {
        status(el, 'Error: ' + e.message, 'error');
      }
    });

    // ── Fetch Comments ──
    $('#fetch-btn').addEventListener('click', () => loadComments());

    async function loadComments() {
      const post = $('#post-id-input').value.trim() || 'test';
      const list = $('#comment-list');
      const el = $('#fetch-status');

      status(el, 'fetching...', 'loading');
      list.innerHTML = '';

      try {
        const comments = await Comment.loadComments(post, SITE_DID);

        if (!comments.length) {
          list.innerHTML = '<div class="empty-state">no comments yet — be the first</div>';
          status(el, '0 comments', 'success');
          return;
        }

        // Fetch like data
        const uris = comments.map(c => c.uri);
        const { counts, byUser } = await Comment.loadLikes(uris, SITE_DID);

        comments.forEach(c => {
          const card = createCard(c, counts.get(c.uri) || 0, byUser);
          list.appendChild(card);
        });

        status(el, comments.length + ' comments', 'success');
      } catch (e) {
        status(el, 'Error: ' + e.message, 'error');
      }
    }

    function createCard(c, likes, byUserMap) {
      const card = document.createElement('div');
      card.className = 'comment-card';

      const author = c.authorHandle || c.author.slice(0, 20);
      const time = new Date(c.createdAt).toLocaleString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });

      const isOwn = session?.did === c.author;
      const isLiked = byUserMap.get(session?.did)?.has(c.uri);

      card.innerHTML = `
        <div class="comment-header">
          <a class="comment-author" href="https://bsky.app/profile/${c.authorHandle || c.author}" target="_blank">@${author}</a>
          <span class="comment-time">${time}</span>
        </div>
        <div class="comment-text">${escHtml(c.message)}</div>
        <div class="comment-actions">
          <button class="like-btn ${isLiked ? 'liked' : ''}" data-uri="${c.uri}" ${!session ? 'disabled' : ''}>♥ ${likes}</button>
          ${isOwn ? `<button class="delete-btn" data-uri="${c.uri}">✕ DELETE</button>` : ''}
        </div>
      `;

      // Like
      card.querySelector('.like-btn').addEventListener('click', async (e) => {
        if (!session) {
          e.target.textContent = '♥ ' + likes + ' (sign in)';
          return;
        }
        try {
          if (isLiked) {
            e.target.textContent = '♥ ' + (likes - 1);
            e.target.classList.remove('liked');
          } else {
            await Comment.like(c.uri, SITE_DID);
            e.target.textContent = '♥ ' + (likes + 1);
            e.target.classList.add('liked');
          }
        } catch (err) {
          console.error('Like failed:', err);
          e.target.textContent = '♥ ' + likes + ' (err)';
        }
      });

      // Delete
      card.querySelector('.delete-btn')?.addEventListener('click', async (e) => {
        if (!confirm('Delete this comment?')) return;
        try {
          await Comment.remove(c.uri);
          card.remove();
        } catch (err) {
          console.error('Delete failed:', err);
        }
      });

      return card;
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Init ──
    // Check for auth error from callback
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('auth_error')) {
      status($('#auth-status'), 'Auth error: ' + urlParams.get('auth_error'), 'error');
      // Clean URL
      history.replaceState(null, '', location.pathname);
    } else if (urlParams.get('logged_in')) {
      history.replaceState(null, '', location.pathname);
    }

    checkAuth();
  </script>
</head>
<body>
  <div class="bsky-test">
    <h1>ATproto Comment Test</h1>
    <div class="subtitle">
      OAuth DPoP · Constellation backlinks · custom records · PDS-hosted data<br>
      Record types: <code>agency.lastnpcalex.comment</code>, <code>agency.lastnpcalex.like</code>
    </div>

    <!-- Auth -->
    <div class="panel" id="auth-panel">
      <h2>◈ Authenticate</h2>
      <div class="auth-row" id="auth-form">
        <input type="text" id="handle-input" placeholder="handle.bsky.social" style="flex:1">
        <button class="btn" id="login-btn">SIGN IN</button>
      </div>
      <button class="btn btn-sm btn-danger" id="logout-btn" style="display:none">LOGOUT</button>
      <div class="status" id="auth-status"></div>
    </div>

    <!-- Post Comment -->
    <div class="panel">
      <h2>◈ Post Comment</h2>
      <div class="comment-form">
        <label style="font-size:10px;color:#5a6473;text-transform:uppercase;letter-spacing:0.15em;">Post ID</label>
        <select id="post-select">
          <option value="test">test</option>
          <option value="neam">neam</option>
          <option value="vectoralism-signal">vectoralism-signal</option>
        </select>
        <textarea id="comment-input" placeholder="leave a comment..." rows="3"></textarea>
        <button class="btn" id="post-comment-btn">POST</button>
      </div>
      <div class="status" id="comment-status"></div>
    </div>

    <!-- Display -->
    <div class="panel">
      <h2>◈ Comments</h2>
      <div class="fetch-row">
        <input type="text" id="post-id-input" value="test" placeholder="post ID">
        <button class="btn" id="fetch-btn">FETCH</button>
      </div>
      <div id="comment-list"></div>
      <div class="status" id="fetch-status"></div>
    </div>
  </div>
</body>
</html>
